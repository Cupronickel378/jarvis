name: Build EXE
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions: # Добавляем права прямо в скрипт
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: build prep
        run: |
          cd frontend
          npm install
          npm pkg set scripts.build="vite build"
          cd ..

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v1.0.0
          releaseName: "Jarvis v1.0.0"
          releaseDraft: false # Сразу публикуем, не оставляем в черновиках
          prerelease: false

      - name: Upload Artifacts (Запасной вариант)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-Windows-Build
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
